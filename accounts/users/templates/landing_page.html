{% extends 'base.html' %}

{% block content %}

<style>

    body{
        margin:0;
        font-family: Arial, sans-serif;
    }

    .landing-page{
        height:100vh;
        background: linear-gradient(to bottom right, #0d6efd, #001f6b);
        color:white;
        padding:40px 70px;
    }

    .navbar{
        display:flex;
        justify-content:space-between;
        align-items:center;
    }

    .logo{
        font-size:40px;
        font-weight:bold;
    }

    .nav-links a{
        color:white;
        text-decoration:none;
        margin-left:30px;
        font-size:20px;
    }

    .signup-btn{
        border:1px solid white;
        padding:10px 20px;
        border-radius:10px;
    }

    .hero{
        margin-top:120px;
    }

    .hero h1{
        font-size:100px;
        margin-bottom:10px;
    }

    .hero h2{
        font-size:60px;
        font-weight:normal;
        margin-bottom:30px;
    }

    .hero p{
        width:500px;
        font-size:24px;
        line-height:1.6;
        margin-bottom:40px;
    }

    .buttons a{
        text-decoration:none;
        color:white;
        border:2px solid white;
        padding:15px 35px;
        border-radius:12px;
        margin-right:20px;
        font-size:24px;
    }

</style>

<div class="landing-page">

  

    <div class="navbar">

        <div class="logo">
            My Website
        </div>

        <div class="nav-links">

            <a href="#">Home</a>

            <a href="#">About</a>

            <a href="{%url 'login'%}">
                Login
            </a>

            <a href="{%url 'register'%}" class="signup-btn">
                Sign Up
            </a>

        </div>

    </div>


    <div class="hero">

        <h1>Landing Page</h1>

        <h2>Creative Design</h2>

        <p>
            Welcome to our website.
            Create your account and explore amazing features.
        </p>

        <div class="buttons">

            <a href="{%url 'register'%}">
                Sign Up
            </a>

            <a href="{%url 'login'%}">
                Login
            </a>

        </div>

    </div>

</div>

{% endblock %}
