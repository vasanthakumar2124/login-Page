{% extends "base.html" %}
{% block content %}
<div class="container">
    <center>
    <br>
    <h2>Register</h2><hr>
    <br>
    {%if messages%}
    <div class="mt-3">
        {%for message in messages%}
        <div class="alert alert-danger" role="alert">{{message}}</div>
        {%endfor%}
    </div>
    {%endif%}
    <br>
    <form class ="form-group" method="POST">
        {% csrf_token %}
        <input class="form-control" type="text" name="username" required placeholder="Username"/><br>
        <input class="form-control" type="password" name="password" required placeholder="password"/><br>
        <input class="form-control" type="password" name="confirm_password" required placeholder="confirm_password"/><br>
        
        <button class ='btn btn-success' type="submit"> Register </button>
    </form>
    <p>Already have an account? <a href="{%url 'login'%}"> Login here</a></p>
    </center>
</div>
{% endblock content %}
